<!DOCTYPE html>
<html>
<head>
  <title>Hotel Manager Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; background:#f4f6f9; padding:10px; }
    .card { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; }
    input,select,button { padding:10px; border-radius:8px; border:1px solid #ccc; }
    button { background:#007bff; color:#fff; border:none; }
    .danger { background:red; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th,td { padding:8px; border:1px solid #ddd; text-align:center; }
    th { background:#007bff; color:#fff; }
  </style>
</head>

<body>

<div class="card">
<h2>🏨 Guest Entry</h2>
<div class="grid">
<input id="name" placeholder="Name">
<input id="room" placeholder="Room">
<input id="amount" placeholder="Amount">
<select id="payment">
<option>Cash</option>
<option>GPay</option>
<option>Treebo</option>
</select>
<button onclick="addGuest()">Add</button>
</div>
</div>

<div class="card">
<h2>💸 Expense Entry</h2>
<div class="grid">
<input id="expAmount" placeholder="Amount">
<input id="staff" placeholder="Staff">
<input id="category" placeholder="Category">
<select id="expPay">
<option>Cash</option>
<option>GPay</option>
</select>
<button onclick="addExpense()">Add</button>
</div>
</div>

<div class="card">
<h2>📅 Date Filter</h2>
<div class="grid">
<input type="date" id="from" onchange="filterData()">
<input type="date" id="to" onchange="filterData()">
</div>
</div>

<div class="card">
<h2>📋 Guests</h2>
<table>
<thead>
<tr><th>Date</th><th>Name</th><th>Room</th><th>Amount</th><th>Pay</th><th>X</th></tr>
</thead>
<tbody id="guestTable"></tbody>
</table>
</div>

<div class="card">
<h2>💸 Expenses</h2>
<table>
<thead>
<tr><th>Date</th><th>Category</th><th>Staff</th><th>Amount</th><th>Pay</th><th>X</th></tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxdomFMz-J1FlHFnujB2Fwlm-puXP02ok",
  authDomain: "hotel-nakshatra-app.firebaseapp.com",
  projectId: "hotel-nakshatra-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let guests=[], expenses=[];

window.addGuest = async ()=>{
  await addDoc(collection(db,"guests"),{
    name:name.value,
    room:room.value,
    amt:Number(amount.value),
    payment:payment.value,
    date:new Date().toLocaleDateString('en-GB'),
    raw:new Date().toISOString()
  });
};

window.addExpense = async ()=>{
  await addDoc(collection(db,"expenses"),{
    amt:Number(expAmount.value),
    category:category.value,
    staff:staff.value,
    payment:expPay.value,
    date:new Date().toLocaleDateString('en-GB'),
    raw:new Date().toISOString()
  });
};

window.deleteGuest = async(id)=>{
  await deleteDoc(doc(db,"guests",id));
};

window.deleteExpense = async(id)=>{
  await deleteDoc(doc(db,"expenses",id));
};

onSnapshot(collection(db,"guests"),snap=>{
  guests=[]; snap.forEach(d=>guests.push({id:d.id,...d.data()}));
  showAll();
});

onSnapshot(collection(db,"expenses"),snap=>{
  expenses=[]; snap.forEach(d=>expenses.push({id:d.id,...d.data()}));
  showAll();
});

function showAll(){
  guestTable.innerHTML = guests.map(g=>rowGuest(g)).join("");
  expenseTable.innerHTML = expenses.map(e=>rowExp(e)).join("");
}

function filterData(){

  let f = from.value;
  let t = to.value;

  let fg = guests.filter(g=>{
    let d = new Date(g.raw || g.date.split("/").reverse().join("-"));
    return (!f || new Date(f)<=d) && (!t || new Date(t)>=d);
  });

  let fe = expenses.filter(e=>{
    let d = new Date(e.raw || e.date.split("/").reverse().join("-"));
    return (!f || new Date(f)<=d) && (!t || new Date(t)>=d);
  });

  guestTable.innerHTML = fg.map(g=>rowGuest(g)).join("");
  expenseTable.innerHTML = fe.map(e=>rowExp(e)).join("");
}

function rowGuest(g){
return `<tr>
<td>${g.date}</td>
<td>${g.name}</td>
<td>${g.room}</td>
<td>₹${g.amt}</td>
<td>${g.payment}</td>
<td><button class="danger" onclick="deleteGuest('${g.id}')">X</button></td>
</tr>`;
}

function rowExp(e){
return `<tr>
<td>${e.date}</td>
<td>${e.category}</td>
<td>${e.staff||""}</td>
<td>₹${e.amt}</td>
<td>${e.payment}</td>
<td><button class="danger" onclick="deleteExpense('${e.id}')">X</button></td>
</tr>`;
}

</script>

</body>
</html>
